<div class="main-login">
  <div>
    <app-header></app-header>
  </div>
  <div class="auth-container">
    <div class="auth-card">
      <!-- LEFT -->
      <div class="auth-left">
        <div class="overlay-content">
          <div class="logo">
            <img src="/assets/images/brand/logo-main.png" />
            <img src="/assets/images/brand/logo-sub.png" />
          </div>

          <div class="welcome">
            <h1>CHÀO MỪNG!</h1>
            <h2>ĐẾN VỚI ÁO DÀI NGŨ THÂN PHỤC</h2>
            <p>
              Khám phá vẻ đẹp cổ phục Việt Nam<br />
              cùng bộ sưu tập áo dài truyền thống.
            </p>

            <div class="socials">
              <i class="fab fa-linkedin-in"></i>
              <i class="fab fa-facebook-f"></i>
              <i class="fab fa-instagram"></i>
              <i class="fab fa-twitter"></i>
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="auth-right">
        <h2>ĐĂNG NHẬP</h2>

        <div class="input-group">
          <label>Email</label>
          <input
            type="email"
            [(ngModel)]="loginData.email"
            name="email"
            placeholder="Nhập email của bạn"
          />
          <i class="far fa-envelope"></i>
        </div>

        <div class="input-group">
          <label>Mật khẩu</label>
          <input
            type="password"
            [(ngModel)]="loginData.password"
            name="password"
            placeholder="Nhập mật khẩu"
          />
          <i class="fas fa-lock"></i>
        </div>

        <div class="options">
          <label
            ><input type="checkbox" [(ngModel)]="loginData.rememberMe" name="rememberMe" /> Ghi nhớ
            đăng nhập</label
          >
          <a href="#">Quên mật khẩu?</a>
        </div>

        <button (click)="onSignIn()">ĐĂNG NHẬP</button>

        <p class="signup">
          Chưa có tài khoản? <a href="#" (click)="switchToSignUp($event)">Đăng ký ngay</a>
        </p>
      </div>
    </div>
  </div>
  <div>
    <app-footer></app-footer>
  </div>
</div>
