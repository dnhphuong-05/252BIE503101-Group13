<div class="measurements-page">
  <div class="page-header">
    <div>
      <h1 class="page-title">
        <i class="fas fa-ruler"></i>
        Số đo (may đo)
      </h1>
      <p class="page-subtitle">Cập nhật số đo hiện tại để gợi ý cổ phục phù hợp hơn.</p>
    </div>
    <button class="btn btn-primary" (click)="saveMeasurements()" [disabled]="isSaving">
      <i class="fas fa-save"></i>
      <span>Cập nhật</span>
    </button>
  </div>

  <div class="info-banner">
    <div>
      <h3>Đơn vị đo: cm</h3>
      <p>Vui lòng đo đúng chuẩn để kết quả may đo chính xác.</p>
    </div>
    <div class="last-update" *ngIf="lastMeasuredAt">
      <i class="fas fa-clock"></i>
      Lần đo gần nhất: {{ lastMeasuredAt }}
    </div>
  </div>

  <form [formGroup]="measurementsForm" (ngSubmit)="saveMeasurements()" class="measurements-form">
    <div class="form-grid">
      <div class="form-group">
        <label>Vòng cổ (cm)</label>
        <input class="form-input" type="number" min="0" step="0.1" formControlName="neck" />
      </div>
      <div class="form-group">
        <label>Ngang vai (cm)</label>
        <input class="form-input" type="number" min="0" step="0.1" formControlName="shoulder" />
      </div>
      <div class="form-group">
        <label>Vòng ngực (cm)</label>
        <input class="form-input" type="number" min="0" step="0.1" formControlName="chest" />
      </div>
      <div class="form-group">
        <label>Vòng eo (cm)</label>
        <input class="form-input" type="number" min="0" step="0.1" formControlName="waist" />
      </div>
      <div class="form-group">
        <label>Vòng hông (cm)</label>
        <input class="form-input" type="number" min="0" step="0.1" formControlName="hip" />
      </div>
      <div class="form-group">
        <label>Dài tay áo (cm)</label>
        <input class="form-input" type="number" min="0" step="0.1" formControlName="sleeve" />
      </div>
      <div class="form-group">
        <label>Vòng bắp tay (cm)</label>
        <input class="form-input" type="number" min="0" step="0.1" formControlName="arm" />
      </div>
      <div class="form-group">
        <label>Dài lưng (cm)</label>
        <input class="form-input" type="number" min="0" step="0.1" formControlName="back_length" />
      </div>
      <div class="form-group">
        <label>Dài ống quần (cm)</label>
        <input class="form-input" type="number" min="0" step="0.1" formControlName="leg_length" />
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="isSaving">
        <i class="fas fa-check"></i>
        Lưu số đo
      </button>
    </div>
  </form>
</div>
