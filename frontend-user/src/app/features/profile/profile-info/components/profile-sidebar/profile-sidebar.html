<div class="profile-sidebar">
  <!-- User Card -->
  <div class="user-card">
    <div class="avatar-wrapper">
      <img [src]="getUserAvatar()" [alt]="currentUser?.fullName" class="user-avatar" />
      <div class="avatar-badge">
        <i class="fas fa-check-circle"></i>
      </div>
    </div>
    <h3 class="user-name">{{ currentUser?.fullName || 'Guest User' }}</h3>
    <p class="user-email">{{ currentUser?.email }}</p>
    <span class="user-badge">
      <i class="fas fa-crown"></i>
      Member
    </span>
  </div>

  <!-- Navigation Menu -->
  <nav class="sidebar-menu">
    <h4 class="menu-title">Account Menu</h4>
    <div class="menu-items">
      <button
        *ngFor="let item of menuItems"
        [class.active]="activeTab === item.id"
        class="menu-item"
      >
        <i class="fas" [ngClass]="item.icon"></i>
        <span class="menu-label">{{ item.label }}</span>
        <span *ngIf="item.badge" class="menu-badge">{{ item.badge }}</span>
        <i class="fas fa-chevron-right menu-arrow"></i>
      </button>
    </div>
  </nav>
</div>
