<header class="topbar">
  <div class="topbar-left">
    <button class="sidebar-toggle" type="button" (click)="toggleSidebar.emit()" title="Toggle sidebar">
      <i class="fas fa-bars"></i>
    </button>

    <div class="search-wrap">
      <i class="fas fa-search search-icon"></i>
      <input
        type="text"
        class="search-input"
        placeholder="Search or type a command (products, blog, users)"
        [(ngModel)]="searchQuery"
        (keyup.enter)="handleSearch()"
      />
      <span class="search-kbd">Ctrl + K</span>
    </div>
  </div>

  <div class="topbar-right">
    <div class="create-dropdown">
      <button class="btn btn-primary" type="button" (click)="toggleCreateMenu()">
        <i class="fas fa-plus"></i>
        <span>Create</span>
      </button>

      @if (createMenuOpen()) {
        <div class="dropdown-menu">
          <div class="dropdown-title">Quick create</div>
          <a class="dropdown-item" [routerLink]="['/products/new']" (click)="closeMenus()">
            <i class="fas fa-box"></i>
            <span>New product</span>
          </a>
          <a class="dropdown-item" [routerLink]="['/blog/posts/new']" (click)="closeMenus()">
            <i class="fas fa-pen-to-square"></i>
            <span>New blog post</span>
          </a>
        </div>
      }
    </div>

    <button class="action-icon" title="Notifications" type="button">
      <i class="fas fa-bell"></i>
      <span class="action-dot"></span>
    </button>

    <div class="relative">
      <button class="user-chip" type="button" (click)="toggleUserMenu()">
        @if (currentUser()?.avatar) {
          <img
            class="user-avatar-img"
            [src]="currentUser()?.avatar"
            [alt]="currentUser()?.name || 'Admin avatar'"
          />
        } @else {
          <div class="user-avatar">{{ userInitials() }}</div>
        }
        <div class="hidden md:block user-meta">
          <div class="text-sm font-semibold">{{ currentUser()?.name }}</div>
          <div class="text-xs text-primary-500">{{ currentUser()?.role }}</div>
        </div>
        <i class="fas fa-chevron-down text-xs text-primary-500"></i>
      </button>

      @if (userMenuOpen()) {
        <div class="user-menu">
          <a [routerLink]="['/profile']" class="menu-item">
            <i class="fas fa-user"></i>
            <span>Profile</span>
          </a>
          <a [routerLink]="['/settings']" class="menu-item">
            <i class="fas fa-gear"></i>
            <span>Settings</span>
          </a>
          <div class="menu-divider"></div>
          <button class="menu-item danger" type="button" (click)="handleLogout()">
            <i class="fas fa-right-from-bracket"></i>
            <span>Logout</span>
          </button>
        </div>
      }
    </div>
  </div>
</header>
